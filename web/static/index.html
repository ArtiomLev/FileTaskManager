<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Менеджер задач</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="task-form.css">
</head>
<body>
<header>

</header>
<main>
    <div class="task-form">
        <span>Создать задачу</span>
        <form method="POST" action="/task" id="task-form" enctype="multipart/form-data">
            <label>
                <span>Номер договора:</span>
                <input type="text" pattern="[0-9]{1,5}-[0-9]{2}" name="ContractNumber" required>
            </label>
            <label>
                <span>Имя задания:</span>
                <input type="text" pattern="[A-Za-zА-Яа-я0-9._\- ]+" name="Name" required>
            </label>
            <label>
                <span>Файлы:</span>
                <input type="File" name="files" multiple>
            </label>
            <input type="submit">
        </form>
    </div>
</main>
<footer>

</footer>
</body>
</html>
